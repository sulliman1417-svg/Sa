<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>سجل المتابعة الرقمي لوزارة التعليم</title>
  
  <!-- تسريع التحميل: الاتصال المبكر بالخوادم لتقليل وقت فتح الموقع -->
  <link rel="preconnect" href="https://unpkg.com">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

      .print-official body, .print-official .bg-white, .print-official .bg-emerald-50, .print-official .bg-blue-50, .print-official .moe-gradient { background: white !important; background-color: transparent !important; }

      .print-visual .shadow-lg, .print-visual .shadow-sm { box-shadow: none !important; }

    .spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: #09594C; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    .spinner-sm { border-width: 2px; width: 20px; height: 20px; border-left-color: #fff; }

<body>
  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background-color:#f8fafc;">
      <div class="spinner" style="margin-bottom:1rem;"></div>
      <h2 style="color:#064e3b;font-weight:bold;font-family:Tajawal;">جاري التحميل...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, Component } = React;

    const apiKey = ""; 
    
    const callGemini = async (prompt, retryCount = 0) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "أنت مساعد ذكي لمعلم في المملكة العربية السعودية. أجب دائماً باللغة العربية، بأسلوب احترافي وتربوي، ومختصر قدر الإمكان." }] }
          })
        });
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "لم أتمكن من توليد استجابة.";
      } catch (error) {
        if (retryCount < 5) {
          await new Promise(res => setTimeout(res, delays[retryCount]));
          return callGemini(prompt, retryCount + 1);
        }
        return "عذراً، حدث خطأ في الاتصال بالمساعد الذكي (الذكاء الاصطناعي غير متاح حالياً).";
      }
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
      } catch (err) {
        console.error('Failed to copy', err);
      }
      document.body.removeChild(textArea);
    };

    // إعدادات وتكوين Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDMC8QDxAiho5x0NqqHhcRMf_rBM11CGeo",
      authDomain: "sgel-67c84.firebaseapp.com",
      databaseURL: "https://sgel-67c84-default-rtdb.firebaseio.com",
      projectId: "sgel-67c84",
      storageBucket: "sgel-67c84.firebasestorage.app",
      messagingSenderId: "387582772605",
      appId: "1:387582772605:web:82bca356d1333e2ab1b814"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database(); 

    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error("React Error:", error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
              <i className="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
              <h1 className="text-2xl font-bold text-red-800 mb-2">عذراً، حدث خطأ</h1>
              <p className="text-red-600 mb-6">{this.state.error?.toString()}</p>
              <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">تحديث الصفحة</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- خطاف المزامنة السحابية المخصص للمستخدم (تزامن حسب الحساب) ---
    function useFirebaseState(user, docName, initialValue) {
      const [data, setData] = useState(initialValue);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!user) return;
        
        // استخدام مسار يتضمن user.uid لعزل بيانات كل حساب وتزامنها مع نفس الحساب فقط
        const ref = db.ref(`users/${user.uid}/appData/${docName}`);

        const onDataChange = (snapshot) => {
          if (snapshot.exists()) {
            try {
              const parsed = JSON.parse(snapshot.val().value);
              setData(parsed);
            } catch(e) {
              setData(snapshot.val().value || initialValue);
            }
          } else {
            setData(initialValue);
          }
          setLoading(false);
        };

        const onError = (error) => {
          console.error(`خطأ في قراءة ${docName}:`, error);
          setLoading(false);
        };

        ref.on('value', onDataChange, onError);
        return () => ref.off('value', onDataChange);
      }, [user, docName]);

      const setValue = (newValue) => {
        setData(prev => {
          const next = typeof newValue === 'function' ? newValue(prev) : newValue;
          if (user) {
            const ref = db.ref(`users/${user.uid}/appData/${docName}`);
            ref.set({ value: JSON.stringify(next) }).catch(err => {
              console.error("خطأ في الحفظ:", err);
            });
          }
          return next;
        });
      };

      return [data, setValue, loading];
    }

    const opts = {
      attendance: ['✅ حضور', '❌ غياب', '🕒 تأخر بعذر', '⏳ تأخر بدون عذر'],
      task: ['-','🌟 أداء متميز', '👍 أداء جيد', '📝 لم ينجز'],
      behavior: ['-','🏆 مشارك ومتميز', '😶 هادئ / غير مشارك', '⚠️ لفت نظر', '🛑 مخالفة سلوكية']
    };

    const daysOfWeekList = [{ id: 0, name: 'الأحد' }, { id: 1, name: 'الإثنين' }, { id: 2, name: 'الثلاثاء' }, { id: 3, name: 'الأربعاء' }, { id: 4, name: 'الخميس' }];

    const themes = {
      emerald: { main: 'emerald', bgLight: 'bg-emerald-50', text: 'text-emerald-900', border: 'border-emerald-200' },
      blue: { main: 'blue', bgLight: 'bg-blue-50', text: 'text-blue-900', border: 'border-blue-200' },
      slate: { main: 'slate', bgLight: 'bg-slate-50', text: 'text-slate-900', border: 'border-slate-200' },
      indigo: { main: 'indigo', bgLight: 'bg-indigo-50', text: 'text-indigo-900', border: 'border-indigo-200' }
    };

    // ===========================================================================
    // التطبيق الرئيسي
    // ===========================================================================
    function MainApp({ user }) {
      const defaultSettings = {
        schoolName: 'المدرسة غير محددة', teacherName: '', principalName: '',
        showFooter: true, showHeader: true, showSmartFill: true,
        reportTheme: 'emerald', reportOrientation: 'portrait', reportTemplate: 'official', 
        printScale: 85, printCompact: true, printBorders: 'medium', printTableSize: 'text-xs', printHeadingSize: 'text-2xl',
        printHeaderRight: 'المملكة العربية السعودية\nوزارة التعليم\nإدارة التعليم بـ .....',
        printHeaderLeft: 'المدرسة: ........\nالمعلم: ........\nالمادة: ........',
        printFooterRight: 'معلم المادة:\n......................',
        printFooterLeft: 'مدير المدرسة:\n......................',
      };

      const [studentsDB, setStudentsDB, loadingStudents] = useFirebaseState(user, 'students', []);
      const [records, setRecords, loadingRecords] = useFirebaseState(user, 'records', []);
      const [settings, setSettings, loadingSettings] = useFirebaseState(user, 'settings', defaultSettings);

      const [activeTab, setActiveTab] = useState('daily'); 
      const [selectedClass, setSelectedClass] = useState('');
      const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
      const [lessonName, setLessonName] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [toastMessage, setToastMessage] = useState('');
      const [activeBulkMenu, setActiveBulkMenu] = useState(null);

      const [lessonAiTip, setLessonAiTip] = useState('');
      const [isFetchingAiTip, setIsFetchingAiTip] = useState(false);

      const classList = useMemo(() => [...new Set((studentsDB || []).map(s => s.class))].sort(), [studentsDB]);
      
      useEffect(() => {
        if (classList.length > 0 && !selectedClass && !classList.includes(selectedClass)) {
          setSelectedClass(classList[0]);
        }
      }, [classList, selectedClass]);

      const currentStudents = useMemo(() => {
        if (searchQuery.trim() !== '') {
          const q = searchQuery.toLowerCase();
          return (studentsDB || []).filter(s => 
            s.name.toLowerCase().includes(q) || s.id.includes(q) || s.class.toLowerCase().includes(q)
          );
        }
        return (studentsDB || []).filter(s => s.class === selectedClass);
      }, [studentsDB, selectedClass, searchQuery]);

      const todayRecords = useMemo(() => {
        return (records || []).filter(r => {
          if (r.date !== currentDate) return false;
          if (searchQuery.trim() !== '') return true; 
          return r.class === selectedClass;
        });
      }, [records, currentDate, selectedClass, searchQuery]);

      if (loadingStudents || loadingRecords || loadingSettings) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
            <div className="spinner mb-4 border-l-emerald-600"></div>
            <h2 className="text-emerald-900 font-bold text-lg">جاري المزامنة مع بيانات حسابك...</h2>
          </div>
        );
      }

      const calculateManualViolations = (studentId) => {
        const studentRecords = (records||[]).filter(r => r.studentId === studentId);
        let count = 0;
        studentRecords.forEach(r => {
          if (r.manualFields && r.manualFields.length > 0) {
            if (r.manualFields.includes('attendance') && (r.attendance.includes('غياب') || r.attendance.includes('تأخر'))) count++;
            if (r.manualFields.includes('homework') && r.homework.includes('لم ينجز')) count++;
            if (r.manualFields.includes('practical') && r.practical.includes('لم ينجز')) count++;
            if (r.manualFields.includes('project') && r.project.includes('لم ينجز')) count++;
            if (r.manualFields.includes('behavior') && (r.behavior.includes('لفت نظر') || r.behavior.includes('مخالفة'))) count++;
          }
        });
        return count;
      };

      const alertedStudents = (studentsDB || []).map(s => ({
        ...s, violationsCount: calculateManualViolations(s.id)
      })).filter(s => s.violationsCount > 10).sort((a, b) => b.violationsCount - a.violationsCount);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      const getVal = (studentId, field, fallback) => {
        const rec = todayRecords.find(r => r.studentId === studentId);
        return rec ? rec[field] : fallback;
      };

      const updateRecord = (studentId, field, value) => {
        setRecords(prev => {
          const safePrev = prev || [];
          const existingIdx = safePrev.findIndex(r => r.date === currentDate && r.studentId === studentId);
          if (existingIdx >= 0) {
            const updated = [...safePrev];
            const currentManualFields = updated[existingIdx].manualFields || [];
            if (!currentManualFields.includes(field)) currentManualFields.push(field); 
            updated[existingIdx] = { ...updated[existingIdx], [field]: value, manualFields: currentManualFields };
            return updated;
          } else {
            const student = studentsDB.find(s => s.id === studentId);
            return [...safePrev, {
              id: Date.now() + Math.random(), date: currentDate, class: student.class, stage: student.stage, subject: student.subject,
              studentId: studentId, studentName: student.name, lessonName: lessonName,
              attendance: field === 'attendance' ? value : '-', homework: field === 'homework' ? value : '-',
              practical: field === 'practical' ? value : '-', project: field === 'project' ? value : '-',
              behavior: field === 'behavior' ? value : '-', notes: field === 'notes' ? value : '',
              manualFields: [field]
            }];
          }
        });
      };

      const bulkUpdateColumn = (field, value) => {
        const newRecords = [...(records || [])];
        currentStudents.forEach(student => {
          const existingIdx = newRecords.findIndex(r => r.date === currentDate && r.studentId === student.id);
          if (existingIdx >= 0) {
            const currentManualFields = newRecords[existingIdx].manualFields || [];
            if (!currentManualFields.includes(field)) currentManualFields.push(field);
            newRecords[existingIdx][field] = value;
            newRecords[existingIdx].manualFields = currentManualFields;
          } else {
            newRecords.push({
              id: Date.now() + Math.random(), date: currentDate, class: student.class, stage: student.stage, subject: student.subject,
              studentId: student.id, studentName: student.name, lessonName: lessonName,
              attendance: field === 'attendance' ? value : '-', homework: field === 'homework' ? value : '-',
              practical: field === 'practical' ? value : '-', project: field === 'project' ? value : '-',
              behavior: field === 'behavior' ? value : '-', notes: '', manualFields: [field]
            });
          }
        });
        setRecords(newRecords);
        setActiveBulkMenu(null);
        showToast(`تم التعيين السريع لعدد ${currentStudents.length} طلاب`);
      };

      const handleGenerateLessonTip = async () => {
        if (!lessonName.trim()) {
           alert("يرجى كتابة موضوع الدرس أولاً.");
           return;
        }
        setIsFetchingAiTip(true);
        const prompt = `أنا معلم. موضوع درسي اليوم هو "${lessonName}". اقترح لي 3 أفكار مبتكرة أو أنشطة سريعة لبداية هذا الدرس أو لجعله تفاعلياً بشكل ممتع للطلاب. أجب باختصار وفي نقاط واضحة.`;
        const response = await callGemini(prompt);
        setLessonAiTip(response);
        setIsFetchingAiTip(false);
      };

      const HeaderBulkAction = ({ title, field, options }) => (
        <div className="relative inline-block text-right w-full">
          <div className="flex items-center justify-center gap-1">
            <span className="text-xs sm:text-sm">{title}</span>
            <button onClick={() => setActiveBulkMenu(activeBulkMenu === field ? null : field)} className="text-yellow-400 hover:text-white p-1 rounded-full hover:bg-emerald-700 transition-colors" title="تطبيق على القائمة الحالية">
              <i className="fas fa-bolt"></i>
            </button>
          </div>
          {activeBulkMenu === field && (
            <div className="absolute right-0 sm:left-0 sm:right-auto mt-2 w-40 bg-white rounded-xl shadow-xl z-20 border border-emerald-100 overflow-hidden">
              <div className="py-1">
                <div className="px-3 py-2 text-xs font-bold text-gray-500 border-b bg-gray-50">تطبيق سريع:</div>
                {options.filter(o=>o!=='-').map(opt => (
                  <button key={opt} onClick={() => bulkUpdateColumn(field, opt)} className="block w-full text-right px-4 py-2 text-sm text-gray-700 hover:bg-emerald-50 hover:text-emerald-900 font-bold">{opt}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      );

      return (
        <div className="min-h-screen text-gray-800 pb-24">
          {toastMessage && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-emerald-600 text-white px-4 py-2 rounded-full shadow-2xl z-50 flex items-center gap-2 no-print border-2 border-emerald-400 font-bold text-sm">
              <i className="fas fa-check-circle"></i> {toastMessage}
            </div>
          )}

          <header className="moe-gradient text-white shadow-lg no-print sticky top-0 z-40">
            <div className="container mx-auto px-2 sm:px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
              <div className="flex items-center gap-3 w-full md:w-auto">
                <div className="bg-white p-2 rounded-full shadow-md border-2 border-yellow-500 text-emerald-800">
                  <i className="fas fa-book-reader text-xl"></i>
                </div>
                <div>
                  <h1 className="text-lg sm:text-xl font-bold tracking-wide">وزارة التـعـلـيـم</h1>
                  <p className="text-emerald-200 text-xs truncate max-w-[200px]">{settings.schoolName}</p>
                </div>
              </div>
              
              <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 scrollbar-hide snap-x px-1">
                {[
                  { id: 'daily', icon: 'fa-calendar-check', label: 'الرصد اليومي' },
                  { id: 'reports', icon: 'fa-chart-pie', label: 'التقارير' },
                  settings.showSmartFill ? { id: 'smart', icon: 'fa-magic text-yellow-300', label: 'المولد الذكي' } : null,
                  { id: 'alerts', icon: 'fa-bell text-red-300', label: `تنبيهات (${alertedStudents.length})`, hasAlert: alertedStudents.length > 0 },
                  { id: 'settings', icon: 'fa-cogs', label: 'الإعدادات' },
                ].filter(Boolean).map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`relative flex items-center gap-2 px-3 py-2 rounded-lg whitespace-nowrap transition-all text-sm font-bold snap-center shrink-0
                      ${activeTab === tab.id ? 'bg-white text-emerald-900 shadow-md border-b-4 border-yellow-500' : 'hover:bg-emerald-800/50 text-emerald-50'}
                      ${tab.hasAlert && activeTab !== tab.id ? 'animate-pulse text-red-200' : ''}`}
                  >
                    <i className={`fas ${tab.icon}`}></i> {tab.label}
                    {tab.hasAlert && <span className="absolute top-1 left-1 w-2.5 h-2.5 bg-red-500 rounded-full"></span>}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="container mx-auto p-2 sm:p-4 md:p-6">
            {activeTab === 'daily' && (
              <div className="space-y-4 animate-in fade-in">
                {classList.length > 0 && (
                  <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-100 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">
                    <div>
                      <label className="block text-sm font-bold text-emerald-900 mb-1">الفصل / الشعبة</label>
                      <select value={selectedClass} onChange={(e) => setSelectedClass(e.target.value)} className="w-full border-2 border-gray-200 rounded-lg focus:border-emerald-500 bg-gray-50 p-2 font-bold text-sm">
                        {classList.map(c => {
                          const sample = studentsDB.find(s=>s.class===c);
                          return <option key={c} value={c}>الشعبة {c} - {sample?.subject || ''}</option>
                        })}
                      </select>
                    </div>
                    <div>

    // ===========================================================================
    // المولد الذكي (المبني على جدول الحصص)
    // ===========================================================================
    function SmartFillView({ records, setRecords, showToast, studentsDB, classList, daysOfWeekList }) {
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [targetClass, setTargetClass] = useState('all'); 
      const [classDays, setClassDays] = useState([0, 1, 2, 3, 4]); 
      const [normalPercentage, setNormalPercentage] = useState(90);

      const toggleDay = (dayId) => {
        if (classDays.includes(dayId)) setClassDays(classDays.filter(id => id !== dayId));
        else setClassDays([...classDays, dayId].sort());
      };

      const handleSmartGenerate = () => {
        if (!startDate || !endDate || !targetClass) return alert("يرجى إكمال البيانات");
        if (classDays.length === 0) return alert("يجب تحديد يوم واحد على الأقل في الجدول");
        
        let newRecords = [...records];
        const classesToProcess = targetClass === 'all' ? classList : [targetClass];
        
        let start = new Date(startDate);
        let end = new Date(endDate);
        let generatedDaysCount = 0;
        let totalRecordsAdded = 0;
        
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const dayOfWeek = d.getDay(); 
          if (dayOfWeek === 5 || dayOfWeek === 6 || !classDays.includes(dayOfWeek)) continue;
          
          generatedDaysCount++;
          const dateStr = d.toISOString().split('T')[0];
          
          classesToProcess.forEach(cls => {
            const classStudents = studentsDB.filter(s => s.class === cls);
            classStudents.forEach((student) => {
               let existingRecIdx = newRecords.findIndex(r => r.date === dateStr && r.studentId === student.id);
               let isGood = Math.random() < (normalPercentage/100);
               
               let genVals = {
                 attendance: isGood ? '✅ حضور' : '❌ غياب', 
                 homework: isGood ? '🌟 أداء متميز' : '📝 لم ينجز',
                 practical: isGood ? '🌟 أداء متميز' : '-', 
                 project: '-', 
                 behavior: isGood ? '🏆 مشارك ومتميز' : '-'
               };

               if (existingRecIdx === -1) {
                  // إذا لم يكن هناك أي سجل للطالب في هذا اليوم، قم بإنشاء سجل جديد
                  newRecords.push({
                    id: Date.now() + Math.random(), date: dateStr, class: cls, stage: student.stage, subject: student.subject,
                    studentId: student.id, studentName: student.name, lessonName: 'توليد ذكي',
                    ...genVals,
                    notes: '', manualFields: []
                  });
                  totalRecordsAdded++;
               } else {
                  // إذا كان السجل موجوداً (مثلاً تم رصد حضور أو غياب يدوياً)، سنقوم بحماية التعديلات اليدوية وتعبئة الباقي
                  let rec = { ...newRecords[existingRecIdx] };
                  let manualFields = rec.manualFields || [];
                  let updated = false;

                  ['attendance', 'homework', 'practical', 'project', 'behavior'].forEach(field => {
                    // التجاوز وتعبئة الحقل فقط في حال لم يتم تعديله يدوياً بواسطة المعلم
                    if (!manualFields.includes(field)) {
                      // نحدث الحقل فقط إذا كان فارغاً (-) أو سبق توليده ذكياً (ولم يُلمس يدوياً)
                      if (rec[field] === '-' || rec.lessonName === 'توليد ذكي') {
                         rec[field] = genVals[field];
                         updated = true;
                      }
                    }
                  });

                  if (updated) {
                     newRecords[existingRecIdx] = rec;
                     totalRecordsAdded++;
                  }
               }
            });
          });
        }
        setRecords(newRecords);
        showToast(`تم التوليد بنجاح لعدد ${generatedDaysCount} أيام (${totalRecordsAdded} تعديل وحفظ لـ ${targetClass === 'all' ? 'جميع الشعب' : 'شعبة ' + targetClass})`);
      };

      return (
        <div className="bg-white rounded-xl shadow-sm p-6 max-w-4xl mx-auto border">
          <div className="text-center mb-6">
            <i className="fas fa-magic text-4xl text-yellow-500 mb-4"></i>
            <h2 className="text-2xl font-bold mb-2">المولد الذكي (المبني على جدول الحصص)</h2>
            <p className="text-sm text-gray-500">سيتم رصد السلوكيات والمهام للشعبة فقط في الأيام المحددة ضمن الجدول أدناه متجاهلاً أيام الفراغ.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="space-y-4 bg-gray-50 p-4 rounded-xl border">
               <h3 className="font-bold border-b pb-2"><i className="fas fa-sliders-h text-emerald-600"></i> الإعدادات الأساسية</h3>
               <div><label className="font-bold block mb-1 text-sm">الشعبة المستهدفة</label>
               <select value={targetClass} onChange={e=>setTargetClass(e.target.value)} className="w-full border p-2 rounded bg-white font-bold">
                 <option value="all">🌐 جميع الشعب والمراحل دفعة واحدة</option>
                 {classList.map(c=><option key={c} value={c}>شعبة {c}</option>)}
               </select></div>
               <div><label className="font-bold block mb-1 text-sm">نسبة الإيجابية (الحضور والتميز)</label>
               <input type="number" value={normalPercentage} onChange={e=>setNormalPercentage(e.target.value)} className="w-full border p-2 rounded bg-white" max="100" min="10" /></div>
               <div className="grid grid-cols-2 gap-2">
                 <div><label className="font-bold block mb-1 text-sm">من تاريخ</label><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="w-full border p-2 rounded bg-white text-sm" /></div>
                 <div><label className="font-bold block mb-1 text-sm">إلى تاريخ</label><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="w-full border p-2 rounded bg-white text-sm" /></div>
               </div>
            </div>

            <div className="space-y-4 bg-blue-50 p-4 rounded-xl border border-blue-100">
               <h3 className="font-bold text-blue-900 border-b border-blue-200 pb-2"><i className="fas fa-calendar-week"></i> أيام الحصص في الجدول الأسبوعي</h3>
               <p className="text-xs text-blue-700">اختر الأيام التي تدرس فيها هذه الشعبة ليتم التوليد فيها فقط:</p>
               <div className="flex flex-wrap gap-2">
                  {daysOfWeekList.map(day => (
                    <label key={day.id} className={`flex-1 text-center cursor-pointer p-3 rounded-lg font-bold border-2 transition-all text-sm ${classDays.includes(day.id) ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-blue-200 text-blue-800 hover:bg-blue-100'}`}>
                      <input type="checkbox" className="hidden" checked={classDays.includes(day.id)} onChange={() => toggleDay(day.id)} />
                      {day.name}
                    </label>
                  ))}
               </div>
            </div>
          </div>

          <div className="mt-8 text-center border-t pt-6">
            <button onClick={handleSmartGenerate} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-12 rounded-full shadow-lg text-lg inline-flex items-center gap-2">
              <i className="fas fa-bolt"></i> بدء التوليد الذكي
            </button>
          </div>
        </div>
      );
    }

    // ===========================================================================
    // التنبيهات
    // ===========================================================================
    function AlertsView({ alertedStudents, records, settings }) {
      const openWhatsApp = (student) => {
        const msg = `إشعار ولي أمر الطالب / ${student.name}\nلدى ابنكم (${student.violationsCount}) ملاحظات مقيدة في الغياب والمهام.\nالمدرسة: ${settings.schoolName}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
      };
      return (
        <div className="space-y-4">
          <h2 className="text-2xl font-bold text-red-800"><i className="fas fa-bell"></i> الطلاب المنذرين</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {alertedStudents.map(s => (
              <div key={s.id} className="bg-white border-r-4 border-red-600 p-4 rounded shadow-sm flex justify-between items-center">
                <div><h3 className="font-bold">{s.name}</h3><p className="text-sm text-gray-500">{s.id}</p></div>
                <div className="flex gap-4 items-center">
                  <span className="font-bold text-red-600 text-xl">{s.violationsCount}</span>
                  <button onClick={()=>openWhatsApp(s)} className="bg-green-100 text-green-700 p-2 rounded-full"><i className="fab fa-whatsapp text-xl"></i></button>
                </div>
              </div>
            ))}
            {alertedStudents.length===0 && <div className="col-span-2 text-center p-10 bg-green-50 text-green-700 rounded-xl font-bold">لا توجد تنبيهات حالياً.</div>}
          </div>
        </div>
      );
    }

    // ===========================================================================
    // الإعدادات وإدارة الشُعب وتخصيص الطباعة المتقدمة
    // ===========================================================================
    function SettingsView({ settings, setSettings, studentsDB, setStudentsDB, records, setRecords, showToast, classList, user }) {
      const [newClass, setNewClass] = useState('');
      const [newSubject, setNewSubject] = useState('');
      const [editingClass, setEditingClass] = useState(null); 

      const handleExcelUpload = (e, targetClassToAppend = null) => {
        const file = e.target.files[0];
        const targetClass = targetClassToAppend || newClass.trim();
        
        if(!file || !targetClass) return alert("الرجاء تحديد/كتابة اسم الشعبة أولاً");
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            
            let newStds = [];
            let headerFound = false; let nameIdx = -1; let idIdx = -1;

            json.forEach(row => {
              if(!headerFound) {
                row.forEach((cell, j) => {
                  if(String(cell).includes('الاسم')) nameIdx = j;
                  if(String(cell).includes('سجل') || String(cell).includes('هوية')) idIdx = j;
                });
                if(nameIdx !== -1 && idIdx !== -1) headerFound = true;
              } else if (row.length > 0) {
                const name = String(row[nameIdx] || '').trim();
                const id = String(row[idIdx] || '').trim();
                if(id.length >= 8 && name.length > 5) {
                   if (!studentsDB.find(s => s.id === id) && !newStds.find(s => s.id === id)) {
                      newStds.push({ id, name, class: targetClass, stage: 'غير محدد', subject: newSubject || 'عام' });
                   }
                }
              }
            });

            if(newStds.length > 0) {
              setStudentsDB(prev => [...(prev||[]), ...newStds]);
              showToast(`تم استيراد ${newStds.length} طالب`);
              if(!targetClassToAppend) setNewClass('');
            } else alert('لم يتم العثور على طلاب جدد');
          } catch(err) { alert('خطأ في الملف'); }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
      };

      const handleExportExcel = () => {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(records);
        XLSX.utils.book_append_sheet(wb, ws, "Records");
        XLSX.writeFile(wb, "EduData.xlsx");
      };

      // --- دوال النسخ الاحتياطي السحابي ---
      const handleCloudBackup = async () => {
        try {
          await db.ref(`users/${user.uid}/manual_backup`).set({
            settings: JSON.stringify(settings),
            students: JSON.stringify(studentsDB),
            records: JSON.stringify(records),
            timestamp: new Date().toISOString()
          });
          showToast('تم أخذ نسخة احتياطية وحفظها في السحابة بنجاح!');
        } catch(e) {
          alert('حدث خطأ أثناء حفظ النسخة السحابية: ' + e.message);
        }
      };

      const handleCloudRestore = async () => {
        if(!window.confirm('تنبيه: سيتم مسح البيانات الحالية واستبدالها بالنسخة السحابية المحفوظة مسبقاً. هل أنت متأكد؟')) return;
        try {
          const snapshot = await db.ref(`users/${user.uid}/manual_backup`).once('value');
          if(snapshot.exists()) {
            const data = snapshot.val();
            setSettings(JSON.parse(data.settings));
            setStudentsDB(JSON.parse(data.students));
            setRecords(JSON.parse(data.records));
            showToast('تمت استعادة بيانات النسخة الاحتياطية السحابية بنجاح!');
          } else {
            alert('لا توجد نسخة احتياطية سحابية محفوظة مسبقاً لهذا الحساب.');
          }
        } catch(e) {
          alert('حدث خطأ أثناء الاستعادة: ' + e.message);
        }
      };

      return (
        <div className="space-y-6 max-w-6xl mx-auto">
          {/* الحساب */}
          <div className="bg-white p-6 rounded-xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
             <div className="text-center md:text-right">
                <h3 className="font-bold text-lg"><i className="fas fa-user-circle text-emerald-600"></i> الحساب السحابي (Realtime)</h3>
                <p className="text-gray-500 text-sm mt-1">{user.isAnonymous ? 'زائر (بيانات مؤقتة)' : user.email}</p>
             </div>
             <button onClick={() => firebase.auth().signOut()} className="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold border border-red-200 hover:bg-red-100 transition-colors">تسجيل الخروج</button>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            {/* قسم النسخ الاحتياطي السحابي (الجديد) */}
            <div className="bg-blue-50 p-6 rounded-xl border border-blue-200 shadow-sm col-span-1 lg:col-span-2 flex flex-col md:flex-row items-center justify-between gap-6">
              <div>
                <h3 className="font-bold text-lg text-blue-900 mb-2"><i className="fas fa-cloud-upload-alt"></i> النسخ الاحتياطي السحابي</h3>

    // ===========================================================================
    // التقارير والمساعد الذكي لولي الأمر
    // ===========================================================================
    function ReportsCenterView({ studentsDB, records, classList, settings, themes, showToast }) {
      const [reportType, setReportType] = useState('comprehensive'); 
      const [selectedSearchClass, setSelectedSearchClass] = useState(classList[0] || '');
      const [selectedStudentId, setSelectedStudentId] = useState('');
      const [cols, setCols] = useState({ present: true, absent: true, tasks: true, behavior: true, excellence: true });

      // Gemini States for Student Report
      const [aiStudentMessage, setAiStudentMessage] = useState('');
      const [isFetchingAiMessage, setIsFetchingAiMessage] = useState(false);

      useEffect(() => {
        if (classList.length > 0 && (!selectedSearchClass || !classList.includes(selectedSearchClass))) {
          setSelectedSearchClass(classList[0]);
        }
      }, [classList, selectedSearchClass]);

      // إعادة تعيين رسالة الذكاء الاصطناعي عند تغيير الطالب
      useEffect(() => {
        setAiStudentMessage('');
      }, [selectedStudentId]);

      const calcStudentStats = (studentId) => {
        const studentRecords = records.filter(r => r.studentId === studentId);
        return {
          totalDays: studentRecords.length,
          present: studentRecords.filter(r => r.attendance.includes('✅')).length,
          absent: studentRecords.filter(r => r.attendance.includes('❌')).length,
          late: studentRecords.filter(r => r.attendance.includes('🕒') || r.attendance.includes('⏳')).length,
          missingTasks: studentRecords.filter(r => r.homework.includes('لم ينجز') || r.practical.includes('لم ينجز') || r.project.includes('لم ينجز')).length,
          behaviorWarnings: studentRecords.filter(r => r.behavior.includes('لفت نظر') || r.behavior.includes('مخالفة')).length,
          excellence: studentRecords.filter(r => r.behavior.includes('متميز') || r.homework.includes('متميز')).length,
        };
      };

      const groupedData = useMemo(() => {
        const stages = {};
        studentsDB.forEach(student => {
          if (!stages[student.stage]) stages[student.stage] = {};
          if (!stages[student.stage][student.class]) stages[student.stage][student.class] = [];
          stages[student.stage][student.class].push({ ...student, stats: calcStudentStats(student.id) });
        });
        return stages;
      }, [records, studentsDB]);

      const classStudentsData = useMemo(() => {
        return studentsDB.filter(s => s.class === selectedSearchClass).map(s => ({ ...s, stats: calcStudentStats(s.id) }));
      }, [selectedSearchClass, records, studentsDB]);

      const student = studentsDB.find(s => s.id === selectedStudentId);
      const studentRecords = useMemo(() => records.filter(r => r.studentId === selectedStudentId).sort((a, b) => new Date(b.date) - new Date(a.date)), [selectedStudentId, records]);
      const studentStats = student ? calcStudentStats(student.id) : null;

      const handleGenerateParentMessage = async () => {
        if (!student || !studentStats) return;
        setIsFetchingAiMessage(true);
        const prompt = `اكتب رسالة احترافية، لطيفة ومختصرة لولي أمر الطالب "${student.name}".
        بيانات رصد الطالب: عدد مرات الحضور الكامل (${studentStats.present})، مرات الغياب أو التأخر (${studentStats.absent + studentStats.late})، المهام غير المنجزة (${studentStats.missingTasks})، مخالفات أو لفت نظر (${studentStats.behaviorWarnings})، والمشاركات المتميزة (${studentStats.excellence}).
        اسم المعلم (المرسل): ${settings.teacherName || 'معلم المادة'}.
        اسم المدرسة: ${settings.schoolName}.
        الرسالة يجب أن تشيد بالطالب إذا كان متميزاً، أو تلفت انتباه ولي الأمر بطريقة تربوية ولبقة للقصور إذا كان هناك غياب أو نواقص مهام.`;
        
        const response = await callGemini(prompt);
        setAiStudentMessage(response);
        setIsFetchingAiMessage(false);
      };

      const currentTheme = themes[settings.reportTheme] || themes.emerald;
      const isVisual = settings.reportTemplate === 'visual';
      const wrapperClass = isVisual ? 'print-visual' : 'print-official';
      const pageOrientation = settings.reportOrientation === 'landscape' ? 'landscape' : 'portrait';
      
      const borderColorClass = settings.printBorders === 'light' ? 'border-gray-200' : settings.printBorders === 'dark' ? 'border-gray-800 border-2' : 'border-gray-400';
      const cellPadding = settings.printCompact ? 'p-1' : 'p-2';

      const printScaleValue = settings.printScale || 85; 
      const printHeadingSize = settings.printHeadingSize || 'text-2xl';
      const printTableSize = settings.printTableSize || 'text-xs';

      const PrintHeader = ({ title, subtitle }) => (
        settings.showHeader ? (
          <div className="print-only hidden justify-between items-start mb-6 border-b-2 border-gray-800 pb-4 text-sm font-bold text-black whitespace-pre-wrap">
            <div className="text-right leading-relaxed">{settings.printHeaderRight}</div>
            <div className="text-center leading-relaxed">
              <h2 className={`${printHeadingSize} font-bold`}>{title}</h2>
              <h3 className="mt-1 text-lg">{subtitle}</h3>
            </div>
            <div className="text-left leading-relaxed">{settings.printHeaderLeft}</div>
          </div>
        ) : (
          <div className="print-only hidden text-center mb-4 pb-4 border-b-2 border-gray-800">
            <h1 className={`${printHeadingSize} font-bold`}>{title}</h1>
            <p className="mt-2 text-lg font-bold">{subtitle}</p>
          </div>
        )
      );

      const PrintFooter = () => (
        settings.showFooter ? (
          <div className={`print-only hidden justify-between font-bold text-black pt-6 border-t mt-8 ${borderColorClass} print-break-inside-avoid whitespace-pre-wrap text-sm`}>
            <div className="text-right leading-relaxed w-1/3">{settings.printFooterRight}</div>
            <div className="text-center leading-relaxed w-1/3"></div>
            <div className="text-left leading-relaxed w-1/3">{settings.printFooterLeft}</div>
          </div>
        ) : null
      );

      return (
        <div className={`space-y-6 max-w-6xl mx-auto animate-in fade-in ${wrapperClass}`}>
          <style>{`
            @media print {
              @page { size: A4 ${pageOrientation}; margin: 5mm; }
              .print-zoom-container { zoom: ${printScaleValue}%; }
              .print-table th, .print-table td {
                border-width: ${settings.printBorders === 'light' ? '1px' : settings.printBorders === 'dark' ? '2px' : '1px'} !important;
                border-style: solid !important;
              }
            }
          `}</style>

          <div className={`bg-white rounded-xl shadow-sm border ${currentTheme.border} no-print overflow-hidden`}>
            <div className={`flex flex-col sm:flex-row ${currentTheme.bgLight} border-b ${currentTheme.border}`}>
              <button onClick={() => setReportType('comprehensive')} className={`flex-1 py-4 px-4 text-center font-bold transition-all ${reportType === 'comprehensive' ? `bg-white ${currentTheme.text} border-b-4 border-${currentTheme.main}-600 shadow-sm` : 'text-gray-500 hover:bg-gray-100'}`}>التقرير الشامل للمدرسة</button>
              <button onClick={() => setReportType('class')} className={`flex-1 py-4 px-4 text-center font-bold transition-all ${reportType === 'class' ? `bg-white ${currentTheme.text} border-b-4 border-${currentTheme.main}-600 shadow-sm` : 'text-gray-500 hover:bg-gray-100'}`}>تقرير حسب الشعبة</button>
              <button onClick={() => setReportType('student')} className={`flex-1 py-4 px-4 text-center font-bold transition-all ${reportType === 'student' ? `bg-white ${currentTheme.text} border-b-4 border-${currentTheme.main}-600 shadow-sm` : 'text-gray-500 hover:bg-gray-100'}`}>تقرير خاص بطالب (إشعار)</button>
            </div>

            <div className="p-4 sm:p-6">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <div className="flex-1 w-full space-y-4">
                  {(reportType === 'class' || reportType === 'student') && (
                    <div>
                      <label className={`block text-sm font-bold ${currentTheme.text} mb-2`}>اختر الشعبة للبحث</label>
                      <select value={selectedSearchClass} onChange={(e) => { setSelectedSearchClass(e.target.value); setSelectedStudentId(''); }} className={`w-full md:w-1/2 border-2 ${currentTheme.border} rounded-lg bg-white p-2 font-bold`}>
                        {classList.map(c => <option key={c} value={c}>شعبة {c}</option>)}
                      </select>
                    </div>
                  )}

                  {reportType === 'student' && (
                    <div className={`grid grid-cols-1 md:grid-cols-2 gap-4 ${currentTheme.bgLight} p-4 rounded-xl border ${currentTheme.border}`}>
                      <div>
                        <label className={`block text-sm font-bold ${currentTheme.text} mb-2`}>ابحث واختر الطالب</label>
                        <select value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)} className={`w-full border-2 ${currentTheme.border} rounded-lg bg-white p-2 font-bold`}>
                          <option value="" disabled>-- الرجاء اختيار الطالب --</option>
                          {studentsDB.filter(s=>s.class===selectedSearchClass).map(s => <option key={s.id} value={s.id}>{s.name} - {s.id}</option>)}
                        </select>
                      </div>
                    </div>
                  )}
                  
                  {reportType !== 'student' && (
                    <div className="bg-gray-50 p-3 rounded border flex flex-wrap gap-4 text-sm font-bold">
                       <label className="flex items-center gap-1.5 text-emerald-800"><input type="checkbox" checked={cols.present} onChange={e=>setCols({...cols, present: e.target.checked})} className="accent-emerald-600"/> الحضور</label>
                       <label className="flex items-center gap-1.5 text-red-800"><input type="checkbox" checked={cols.absent} onChange={e=>setCols({...cols, absent: e.target.checked})} className="accent-red-600"/> الغياب</label>
                       <label className="flex items-center gap-1.5 text-orange-800"><input type="checkbox" checked={cols.tasks} onChange={e=>setCols({...cols, tasks: e.target.checked})} className="accent-orange-600"/> المهام</label>
                       <label className="flex items-center gap-1.5 text-red-900"><input type="checkbox" checked={cols.behavior} onChange={e=>setCols({...cols, behavior: e.target.checked})} className="accent-red-900"/> المخالفات</label>
                    </div>
                  )}
                </div>

                <div className="flex flex-col gap-2 w-full md:w-auto">
                  <button onClick={() => window.print()} className={`w-full bg-${currentTheme.main}-600 hover:bg-${currentTheme.main}-700 text-white font-bold py-3 px-8 rounded-xl flex items-center justify-center gap-2 shadow-md`}>
                    <i className="fas fa-print text-xl"></i> طباعة A4
                  </button>
                  <span className="text-xs text-gray-500 text-center font-bold"><i className="fas fa-info-circle text-blue-500"></i> لتغيير أحجام العناوين والجدول أو زوم الطباعة راجع تبويب "الإعدادات"</span>
                </div>
              </div>
            </div>
          </div>

          <div className={`print-zoom-container bg-white p-6 md:p-10 rounded-xl shadow-lg border border-gray-200 print:shadow-none print:border-none print:p-0 print:bg-transparent ${printTableSize}`}>
            
            {/* التقرير الشامل المجمع للمدرسة */}
            {reportType === 'comprehensive' && (
              <>
                <div className={`text-center mb-8 border-b-4 border-${currentTheme.main}-800 pb-4 no-print`}>
                  <h1 className={`text-2xl font-bold ${currentTheme.text}`}>التقرير الشامل للمدرسة بكامل الشعب</h1>
                  <p className="text-gray-600 mt-2 font-bold">{settings.schoolName}</p>
                </div>

                {Object.entries(groupedData).map(([stageName, classes]) => (
                  <React.Fragment key={stageName}>
                    {Object.entries(classes).map(([className, students]) => {
                      return (
                        <div key={className} className={`print-class-page mb-10 border ${currentTheme.border} rounded-xl overflow-hidden print:border-none`}>
                          <PrintHeader title={`تقرير المتابعة الشامل - شعبة ${className}`} subtitle={`${stageName} | المقرر: ${students[0]?.subject || ''}`} />
                          <div className={`${currentTheme.bgLight} p-3 border-b ${currentTheme.border} flex justify-between items-center no-print`}>
                            <h4 className={`font-bold ${currentTheme.text}`}>شعبة {className} - {stageName}</h4>
                            <span className={`text-sm font-bold bg-white ${currentTheme.text} px-3 py-1 rounded-full border`}>{students.length} طلاب</span>
                          </div>
                          <div className="overflow-x-auto table-scroll print:overflow-visible">
                            <table className={`print-table w-full text-right min-w-[700px] print:min-w-full print:border-collapse`}>
                              <thead className={`${isVisual ? currentTheme.bgLight : 'bg-gray-100'} ${isVisual ? currentTheme.text : 'text-black'} border-b-2 ${borderColorClass}`}>
                                <tr>
                                  <th className={`${cellPadding} font-bold text-center w-10 border ${borderColorClass}`}>م</th>
                                  <th className={`${cellPadding} font-bold border ${borderColorClass}`}>اسم الطالب</th>
                                  {cols.present && <th className={`${cellPadding} font-bold text-center border ${borderColorClass}`}>الحضور</th>}
                                  {cols.absent && <th className={`${cellPadding} font-bold text-center text-red-600 print:text-black border ${borderColorClass}`}>غياب وتأخر</th>}
                                  {cols.tasks && <th className={`${cellPadding} font-bold text-center text-orange-600 print:text-black border ${borderColorClass}`}>نقص مهام</th>}
                                  {cols.behavior && <th className={`${cellPadding} font-bold text-center text-red-800 print:text-black border ${borderColorClass}`}>مخالفات</th>}
                                  {cols.excellence && <th className={`${cellPadding} font-bold text-center text-blue-600 print:text-black border ${borderColorClass}`}>تميز</th>}
                                </tr>
                              </thead>
                              <tbody className={`divide-y ${borderColorClass}`}>
                                {students.map((st, idx) => (
                                  <tr key={st.id} className={isVisual ? `hover:${currentTheme.bgLight}` : 'hover:bg-gray-50'}>
                                    <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{idx + 1}</td>
                                    <td className={`${cellPadding} font-bold border ${borderColorClass}`}>{st.name}</td>
                                    {cols.present && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.present}</td>}
                                    {cols.absent && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.absent + st.stats.late}</td>}
                                    {cols.tasks && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.missingTasks}</td>}
                                    {cols.behavior && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.behaviorWarnings}</td>}
                                    {cols.excellence && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.excellence}</td>}
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                          <PrintFooter />
                        </div>
                      );
                    })}
                  </React.Fragment>
                ))}
              </>
            )}

            {/* تقرير شعبة معينة */}
            {reportType === 'class' && selectedSearchClass && (
              <div className="print-class-page">
                <div className={`text-center mb-8 border-b-4 border-${currentTheme.main}-800 pb-4 no-print`}>
                  <h1 className={`text-2xl font-bold ${currentTheme.text}`}>تقرير المتابعة - شعبة {selectedSearchClass}</h1>
                </div>
                <PrintHeader title={`تقرير المتابعة - شعبة ${selectedSearchClass}`} subtitle={`المقرر: ${classStudentsData[0]?.subject || ''}`} />
                <div className={`border ${currentTheme.border} rounded-xl overflow-hidden print:border-none`}>
                  <div className="overflow-x-auto table-scroll print:overflow-visible">
                    <table className={`print-table w-full text-right min-w-[700px] print:min-w-full print:border-collapse`}>
                       <thead className={`${isVisual ? currentTheme.bgLight : 'bg-gray-100'} ${isVisual ? currentTheme.text : 'text-black'} border-b-2 ${borderColorClass}`}>
                        <tr>
                          <th className={`${cellPadding} font-bold text-center w-10 border ${borderColorClass}`}>م</th>
                          <th className={`${cellPadding} font-bold border ${borderColorClass}`}>اسم الطالب</th>
                          {cols.present && <th className={`${cellPadding} font-bold text-center border ${borderColorClass}`}>الحضور</th>}
                          {cols.absent && <th className={`${cellPadding} font-bold text-center text-red-600 print:text-black border ${borderColorClass}`}>الغياب والتأخر</th>}
                          {cols.tasks && <th className={`${cellPadding} font-bold text-center text-orange-600 print:text-black border ${borderColorClass}`}>نقص المهام</th>}
                          {cols.behavior && <th className={`${cellPadding} font-bold text-center text-red-800 print:text-black border ${borderColorClass}`}>سلوكيات</th>}
                          {cols.excellence && <th className={`${cellPadding} font-bold text-center text-blue-600 print:text-black border ${borderColorClass}`}>مشاركات وتميز</th>}
                        </tr>
                      </thead>
                      <tbody className={`divide-y ${borderColorClass}`}>
                        {classStudentsData.map((st, idx) => (
                          <tr key={st.id} className={isVisual ? `hover:${currentTheme.bgLight}` : 'hover:bg-gray-50'}>
                            <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{idx + 1}</td>
                            <td className={`${cellPadding} font-bold border ${borderColorClass}`}>{st.name}</td>
                            {cols.present && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.present}</td>}
                            {cols.absent && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.absent + st.stats.late}</td>}
                            {cols.tasks && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.missingTasks}</td>}
                            {cols.behavior && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.behaviorWarnings}</td>}
                            {cols.excellence && <td className={`${cellPadding} text-center font-bold border ${borderColorClass}`}>{st.stats.excellence}</td>}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
                <PrintFooter />
              </div>
            )}

            {/* تقرير وإشعار طالب محدد مع ميزة المساعد الذكي */}
            {reportType === 'student' && student && (
               <div className="print-class-page relative">
                <div className={`moe-gradient p-6 text-white flex justify-between items-center no-print rounded-t-xl`}>
                  <div className="flex gap-4 items-center">
                    <i className="fas fa-user-graduate text-4xl text-yellow-400"></i>
                    <div>
                      <h2 className="text-2xl font-bold mb-1">إشعار ولي أمر - كشف متابعة مفصل</h2>
                      <p className={`text-sm text-${currentTheme.main}-100`}>{settings.schoolName}</p>
                    </div>
                  </div>
                </div>
                <PrintHeader title={`إشعار ولي أمر - كشف متابعة طالب`} subtitle={settings.schoolName} />
                
                <div className="p-6 bg-gray-50 print:bg-white border-b print:border-gray-400">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8">
                    <div className="flex border-b pb-2"><span className="w-32 font-bold text-gray-500">اسم الطالب:</span> <span className="font-bold text-lg">{student.name}</span></div>
                    <div className="flex border-b pb-2"><span className="w-32 font-bold text-gray-500">رقم السجل:</span> <span className="font-mono font-bold text-lg">{student.id}</span></div>
                    <div className="flex border-b pb-2"><span className="w-32 font-bold text-gray-500">الشعبة:</span> <span className="font-bold">شعبة {student.class}</span></div>
                    <div className="flex border-b pb-2"><span className="w-32 font-bold text-gray-500">المقرر:</span> <span className="font-bold">{student.subject}</span></div>
                  </div>
                </div>

                <div className="p-6 print:p-2">
                  {/* ملخص إحصائي */}
                  <h3 className={`text-xl font-bold ${isVisual ? currentTheme.text : 'text-black'} mb-4 border-r-4 border-yellow-500 pr-3`}>الملخص الإحصائي للطالب</h3>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div className={`rounded-xl p-4 text-center border ${isVisual ? 'bg-emerald-50 border-emerald-100' : 'border-gray-400'}`}>
                      <div className="text-2xl mb-2">✅ الحضور</div>
                      <div className="text-3xl font-bold text-emerald-700 print:text-black">{studentStats.present}</div>
                    </div>
                    <div className={`rounded-xl p-4 text-center border ${isVisual ? 'bg-red-50 border-red-100' : 'border-gray-400'}`}>
                      <div className="text-2xl mb-2">❌ غياب/تأخر</div>
                      <div className="text-3xl font-bold text-red-700 print:text-black">{studentStats.absent + studentStats.late}</div>
                    </div>
                    <div className={`rounded-xl p-4 text-center border ${isVisual ? 'bg-orange-50 border-orange-100' : 'border-gray-400'}`}>
                      <div className="text-2xl mb-2">📝 نواقص مهام</div>
                      <div className="text-3xl font-bold text-orange-700 print:text-black">{studentStats.missingTasks}</div>
                    </div>
                    <div className={`rounded-xl p-4 text-center border ${isVisual ? 'bg-blue-50 border-blue-100' : 'border-gray-400'}`}>
                      <div className="text-2xl mb-2">🏆 التميز</div>
                      <div className="text-3xl font-bold text-blue-700 print:text-black">{studentStats.excellence}</div>
                    </div>
                  </div>

                  {/* قسم صياغة الرسائل بالذكاء الاصطناعي (يظهر في الشاشة ولا يطبع) */}
                  <div className="mb-8 no-print bg-purple-50 rounded-xl p-6 border border-purple-200">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                      <div>
                        <h3 className="text-xl font-bold text-purple-900 flex items-center gap-2"><i className="fas fa-robot text-purple-600"></i> صياغة رسالة لولي الأمر بـ Gemini ✨</h3>
                        <p className="text-sm text-purple-700 mt-1">يقوم الذكاء الاصطناعي بقراءة ملخص الطالب وصياغة رسالة واتساب احترافية ولطيفة لولي أمره.</p>
                      </div>
                      <button onClick={handleGenerateParentMessage} disabled={isFetchingAiMessage} className="ai-gradient text-white font-bold py-2 px-6 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center gap-2 disabled:opacity-50">
                        {isFetchingAiMessage ? <div className="spinner spinner-sm"></div> : <i className="fas fa-magic"></i>}
                        توليد الرسالة
                      </button>
                    </div>

                    {aiStudentMessage && (
                      <div className="bg-white rounded-lg p-4 shadow-inner border border-purple-100 relative animate-in fade-in">
                        <p className="text-gray-800 leading-relaxed whitespace-pre-wrap font-medium">{aiStudentMessage}</p>
                        <button onClick={() => { copyToClipboard(aiStudentMessage); showToast("تم نسخ الرسالة!"); }} className="absolute top-2 left-2 bg-gray-100 hover:bg-gray-200 text-gray-700 p-2 rounded-md shadow-sm transition-colors text-xs font-bold" title="نسخ الرسالة">
                          <i className="fas fa-copy"></i> نسخ
                        </button>
                      </div>
                    )}
                  </div>

                  {/* السجل التفصيلي */}
                  <h3 className={`text-xl font-bold ${isVisual ? currentTheme.text : 'text-black'} mb-4 border-r-4 border-yellow-500 pr-3`}>سجل الرصد التفصيلي حسب الأيام</h3>
                  {studentRecords.length > 0 ? (
                    <div className="overflow-x-auto table-scroll rounded-xl border border-gray-200 print:border-none">
                      <table className={`print-table w-full text-right border-collapse min-w-[500px] print:min-w-full`}>
                        <thead className={`${isVisual ? currentTheme.bgLight : 'bg-gray-100'} ${isVisual ? currentTheme.text : 'text-black'} border-b-2 ${borderColorClass}`}>
                          <tr>
                            <th className={`${cellPadding} font-bold w-32 border ${borderColorClass}`}>التاريخ</th>
                            <th className={`${cellPadding} font-bold border ${borderColorClass}`}>الحضور</th>
                            <th className={`${cellPadding} font-bold border ${borderColorClass}`}>المهام (الواجب والعملي)</th>
                            <th className={`${cellPadding} font-bold border ${borderColorClass}`}>السلوكيات والمشاركات</th>
                          </tr>
                        </thead>
                        <tbody className={`divide-y ${borderColorClass}`}>
                          {studentRecords.map(r => (
                            <tr key={r.id} className="hover:bg-gray-50">
                              <td className={`${cellPadding} font-mono text-gray-600 font-bold border ${borderColorClass}`} dir="ltr">{r.date}</td>
                              <td className={`${cellPadding} font-bold border ${borderColorClass}`}>{r.attendance}</td>
                              <td className={`${cellPadding} border ${borderColorClass}`}>واجب: {r.homework} <br/> عملي: {r.practical}</td>
                              <td className={`${cellPadding} border ${borderColorClass}`}>{r.behavior}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : <div className="text-center p-8 text-gray-400 font-bold border border-dashed border-gray-300">لا توجد بيانات مسجلة لهذا الطالب.</div>}
                </div>
                <PrintFooter />
              </div>
            )}
          </div>
        </div>
      );
    }

    // ===========================================================================
    // نقطة الدخول وتسجيل الدخول
    // ===========================================================================
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = firebase.auth().onAuthStateChanged(u => {
          setUser(u);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const loginGoogle = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).catch(e => alert("خطأ في الدخول: " + e.message));
      };

      const loginAnon = () => {
        firebase.auth().signInAnonymously().catch(e => alert("خطأ في الدخول: " + e.message));
      };

      if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="spinner"></div></div>;

      if (!user) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center border-t-4 border-emerald-600">
               <i className="fas fa-cloud text-6xl text-emerald-600 mb-6"></i>
               <h1 className="text-2xl font-bold mb-8">سجل المتابعة الرقمي</h1>
               <button onClick={loginGoogle} className="w-full bg-white border border-gray-300 text-gray-800 font-bold py-3 px-4 rounded mb-4 hover:bg-gray-50 shadow-sm flex items-center justify-center gap-2">
                 <img src="https://www.svgrepo.com/show/475656/google-color.svg" className="w-5 h-5" /> دخول بحساب جوجل
               </button>
               <button onClick={loginAnon} className="w-full bg-emerald-600 text-white font-bold py-3 px-4 rounded shadow hover:bg-emerald-700">
                 دخول كزائر
               </button>
            </div>
          </div>
        );
      }

      return (
        <ErrorBoundary>
          <MainApp user={user} />
        </ErrorBoundary>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
